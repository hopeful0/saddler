<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saddler Gateway</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1020;
        color: #e5e7eb;
      }

      .container {
        max-width: 640px;
        margin: 64px auto;
        padding: 0 20px;
      }

      .card {
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 20px;
        background: #111827;
      }

      .title {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 600;
      }

      .status {
        margin: 0;
        color: #9ca3af;
      }

      .count {
        margin-top: 16px;
        font-size: 40px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1 class="title">Gateway 运行状态</h1>
        <p class="status" id="gateway-status">检查中...</p>
        <p class="count" id="active-sessions">-</p>
      </section>
    </main>
    <script>
      async function loadGatewayStatus() {
        const statusEl = document.getElementById("gateway-status");
        const countEl = document.getElementById("active-sessions");

        try {
          const response = await fetch("/sessions/active", {
            headers: { Accept: "application/json" },
          });
          if (!response.ok) {
            throw new Error("bad status");
          }
          const data = await response.json();
          statusEl.textContent = "Gateway 运行中";
          countEl.textContent = String(data.active_sessions);
        } catch {
          statusEl.textContent = "Gateway 状态获取失败";
          countEl.textContent = "N/A";
        }
      }

      loadGatewayStatus();
    </script>
  </body>
</html>
