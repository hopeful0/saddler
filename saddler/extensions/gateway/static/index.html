<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saddler Gateway</title>
    <link rel="stylesheet" href="/ui/css/app.css" />
    <link rel="stylesheet" href="/ui/css/components.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
      onerror="window.__markedFailed=true"
    ></script>
  </head>
  <body>
    <div id="cdn-warning" class="hidden" role="status"></div>
    <header class="app-header">
      <label>
        Agent
        <select id="agent-select" aria-label="选择 Agent"></select>
      </label>
      <button type="button" class="btn btn-primary" id="new-session">
        新对话
      </button>
      <div class="conn-wrap">
        <div id="conn-status" data-state="disconnected">
          <span class="conn-dot" aria-hidden="true"></span>
          <span class="conn-label">已断开</span>
        </div>
        <button type="button" class="btn hidden" id="retry-conn">重试</button>
      </div>
    </header>
    <div class="layout">
      <aside id="session-sidebar">
        <ul id="session-list" aria-label="历史会话"></ul>
      </aside>
      <section class="chat-main">
        <div id="chat-hints" class="hidden"></div>
        <div id="messages" aria-live="polite"></div>
        <form id="prompt-form">
          <textarea
            id="prompt-input"
            rows="2"
            placeholder="输入消息…"
            aria-label="消息内容"
          ></textarea>
          <div class="prompt-actions">
            <button type="submit" class="btn btn-primary">发送</button>
            <button
              type="button"
              class="btn hidden"
              id="prompt-cancel"
              disabled
              aria-label="取消当前生成"
            >
              取消
            </button>
          </div>
        </form>
      </section>
    </div>
    <script src="/ui/js/cache.js"></script>
    <script src="/ui/js/acp.js"></script>
    <script src="/ui/js/ui.js"></script>
    <script src="/ui/js/app.js"></script>
  </body>
</html>
